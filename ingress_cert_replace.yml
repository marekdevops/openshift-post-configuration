---
# =============================================================================
# ingress_cert_replace.yml
# Playbook: Podmiana certyfikatu wildcard dla domyślnego Ingress w OpenShift
#
# Pełna procedura zgodna z dokumentacją RH OCP 4.19:
#   https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/
#   html/security_and_compliance/configuring-certificates#replacing-default-ingress
#
# Co robi:
#   1. Weryfikuje środowisko (sesja oc, uprawnienia cluster-admin)
#   2. [backup]   Zapisuje aktualny stan IngressController i proxy/cluster
#   3. [replace]  ConfigMap z root CA → openshift-config
#   4. [replace]  patch proxy/cluster spec.trustedCA → klaster ufa nowemu CA
#   5. [replace]  Secret TLS (wildcard + intermediate) → openshift-ingress
#   6. [replace]  patch IngressController.spec.defaultCertificate
#   7. [replace]  Czeka na rollout routerów i weryfikuje certyfikat
#   8. [rollback] Przywraca poprzedni stan IngressController i proxy/cluster
#   9. [verify]   Sprawdza aktualnie skonfigurowany certyfikat
#
# Wymagania:
#   ansible-galaxy collection install kubernetes.core
#   pip install kubernetes
#   Aktywna sesja oc z uprawnieniami cluster-admin
#
# Uruchomienie:
#   ansible-playbook ingress_cert_replace.yml --tags replace
#   ansible-playbook ingress_cert_replace.yml --tags replace --check   # dry-run
#   ansible-playbook ingress_cert_replace.yml --tags backup            # tylko backup
#   ansible-playbook ingress_cert_replace.yml --tags rollback          # przywrócenie
#   ansible-playbook ingress_cert_replace.yml --tags verify            # weryfikacja
#
# Klucz prywatny — rekomendowane szyfrowanie:
#   ansible-vault encrypt_string "$(cat wildcard.key)" --name cert_key_pem >> vars/ingress_certs.yml
#   ansible-playbook ingress_cert_replace.yml --tags replace --ask-vault-pass
#
# Klaster wykrywany z aktywnej sesji oc (~/.kube/config).
# =============================================================================

- name: "OpenShift — podmiana certyfikatu Ingress (wildcard)"
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - vars/ingress_certs.yml

  tasks:

    # =========================================================================
    # 0. Weryfikacja środowiska — tag: always
    # =========================================================================

    - name: "Weryfikacja — aktywna sesja oc"
      ansible.builtin.command: oc whoami
      register: oc_user
      changed_when: false
      failed_when: oc_user.rc != 0
      tags: [always]

    - name: "Weryfikacja — aktywny kontekst klastra"
      ansible.builtin.command: oc config current-context
      register: oc_context
      changed_when: false
      tags: [always]

    - name: "Weryfikacja — uprawnienia cluster-admin"
      ansible.builtin.command: oc auth can-i '*' '*' --all-namespaces
      register: oc_admin_check
      changed_when: false
      failed_when: "'yes' not in oc_admin_check.stdout"
      tags: [always]

    - name: "Weryfikacja — informacje o środowisku"
      ansible.builtin.debug:
        msg:
          - "Użytkownik   : {{ oc_user.stdout }}"
          - "Kontekst     : {{ oc_context.stdout }}"
          - "Cluster-admin: tak"
      tags: [always]

    - name: "Weryfikacja — sprawdzenie zmiennych certyfikatów [replace]"
      ansible.builtin.assert:
        that:
          - cert_wildcard_pem | length > 0
          - cert_intermediate_pem | length > 0
          - cert_root_pem | length > 0
          - cert_key_pem | length > 0
        fail_msg: >
          Wymagane zmienne są puste. Uzupełnij cert_wildcard_pem,
          cert_intermediate_pem, cert_root_pem i cert_key_pem
          w vars/ingress_certs.yml. Klucz (cert_key_pem) zaszyfruj
          ansible-vault na środowisku produkcyjnym.
        success_msg: "Wszystkie certyfikaty zdefiniowane — kontynuuję."
      tags: [replace]

    # =========================================================================
    # 1. Backup aktualnego stanu — tag: backup, replace
    # =========================================================================

    - name: "Backup — odczyt aktualnej nazwy Secret w IngressController"
      ansible.builtin.command: >
        oc get ingresscontroller {{ ingress_controller_name }}
        -n {{ ingress_operator_namespace }}
        -o jsonpath='{.spec.defaultCertificate.name}'
      register: _current_cert_secret
      changed_when: false
      tags: [backup, replace, rollback]

    - name: "Backup — odczyt aktualnej nazwy ConfigMap w proxy/cluster"
      ansible.builtin.command: >
        oc get proxy cluster
        -o jsonpath='{.spec.trustedCA.name}'
      register: _current_proxy_ca
      changed_when: false
      tags: [backup, replace, rollback]

    - name: "Backup — odczyt pełnej specyfikacji IngressController (snapshot)"
      ansible.builtin.command: >
        oc get ingresscontroller {{ ingress_controller_name }}
        -n {{ ingress_operator_namespace }}
        -o yaml
      register: _ingresscontroller_yaml
      changed_when: false
      tags: [backup, replace]

    - name: "Backup — odczyt pełnej specyfikacji proxy/cluster (snapshot)"
      ansible.builtin.command: oc get proxy cluster -o yaml
      register: _proxy_yaml
      changed_when: false
      tags: [backup, replace]

    - name: "Backup — zapis stanu do pliku {{ ingress_cert_backup_file }}"
      ansible.builtin.copy:
        content: |
          # =================================================================
          # Backup IngressController '{{ ingress_controller_name }}'
          # Klaster  : {{ oc_context.stdout }}
          # Data     : {{ ansible_date_time.iso8601 }}
          # Playbook : ingress_cert_replace.yml
          # =================================================================
          # Przywrócenie:
          #   ansible-playbook ingress_cert_replace.yml --tags rollback
          # =================================================================
          previous_cert_secret_name: "{{ _current_cert_secret.stdout | default('') }}"
          previous_proxy_ca_name: "{{ _current_proxy_ca.stdout | default('') }}"
        dest: "{{ ingress_cert_backup_file }}"
        mode: "0600"
      tags: [backup, replace]

    - name: "Backup — zapis snapshotów YAML (IngressController + proxy)"
      ansible.builtin.copy:
        content: |
          # IngressController snapshot
          {{ _ingresscontroller_yaml.stdout }}
          ---
          # proxy/cluster snapshot
          {{ _proxy_yaml.stdout }}
        dest: "{{ ingress_cert_backup_file | regex_replace('\\.yml$', '-full-snapshot.yml') }}"
        mode: "0600"
      tags: [backup, replace]

    - name: "Backup — aktualny stan"
      ansible.builtin.debug:
        msg:
          - "IngressController Secret : {{ _current_cert_secret.stdout | default('(brak — self-signed)') }}"
          - "proxy/cluster trustedCA  : {{ _current_proxy_ca.stdout | default('(brak)') }}"
      tags: [backup, replace]

    # =========================================================================
    # 2. ConfigMap z root CA → openshift-config — tag: replace
    # Krok 1 z procedury RH: oc create configmap custom-ca
    #   --from-file=ca-bundle.crt=<root-ca> -n openshift-config
    # =========================================================================

    - name: "ConfigMap CA — utwórz lub zaktualizuj '{{ ingress_ca_configmap_name }}' w openshift-config"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ ingress_ca_configmap_name }}"
            namespace: openshift-config
            labels:
              app.kubernetes.io/managed-by: ansible
              app.kubernetes.io/component: ingress-ca
            annotations:
              ingress-cert/replaced-at: "{{ ansible_date_time.iso8601 }}"
              ingress-cert/replaced-by: "{{ oc_user.stdout }}"
          data:
            ca-bundle.crt: "{{ cert_root_pem | trim }}"
      tags: [replace]

    # =========================================================================
    # 3. Patch proxy/cluster — klaster ufa nowemu root CA — tag: replace
    # Krok 2 z procedury RH: oc patch proxy/cluster --type=merge
    #   -p '{"spec":{"trustedCA":{"name":"custom-ca"}}}'
    # =========================================================================

    - name: "proxy/cluster — ustaw trustedCA → '{{ ingress_ca_configmap_name }}'"
      ansible.builtin.command: >
        oc patch proxy/cluster
        --type=merge
        -p '{"spec":{"trustedCA":{"name":"{{ ingress_ca_configmap_name }}"}}}'
      register: _proxy_patch_result
      changed_when: "'no change' not in _proxy_patch_result.stdout"
      tags: [replace]

    - name: "proxy/cluster — wynik patcha"
      ansible.builtin.debug:
        msg: "{{ _proxy_patch_result.stdout }}"
      tags: [replace]

    # =========================================================================
    # 4. Secret TLS (wildcard + intermediate) → openshift-ingress — tag: replace
    # Krok 3 z procedury RH: oc create secret tls <secret>
    #   --cert=<fullchain> --key=<key> -n openshift-ingress
    #
    # tls.crt = wildcard + intermediate (łańcuch serwowany przez router)
    # Root CA NIE trafia tutaj — jest w ConfigMap (krok 2)
    # =========================================================================

    - name: "Certyfikat — złóż łańcuch TLS dla Secretu (wildcard + intermediate)"
      ansible.builtin.set_fact:
        _tls_cert_chain: >-
          {{
            [cert_wildcard_pem | trim, cert_intermediate_pem | trim] | join('\n')
          }}
      tags: [replace]

    - name: "Secret TLS — utwórz lub zaktualizuj '{{ ingress_cert_secret_name }}' w {{ ingress_namespace }}"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ ingress_cert_secret_name }}"
            namespace: "{{ ingress_namespace }}"
            labels:
              app.kubernetes.io/managed-by: ansible
              app.kubernetes.io/component: ingress-certificate
            annotations:
              ingress-cert/replaced-at: "{{ ansible_date_time.iso8601 }}"
              ingress-cert/replaced-by: "{{ oc_user.stdout }}"
              ingress-cert/previous-secret: "{{ _current_cert_secret.stdout | default('self-signed') }}"
          type: kubernetes.io/tls
          stringData:
            tls.crt: "{{ _tls_cert_chain | trim }}"
            tls.key: "{{ cert_key_pem | trim }}"
      tags: [replace]

    # =========================================================================
    # 5. Patch IngressController — tag: replace
    # Krok 4 z procedury RH: oc patch ingresscontroller.operator default
    #   --type=merge -p '{"spec":{"defaultCertificate":{"name":"<secret>"}}}'
    #   -n openshift-ingress-operator
    # =========================================================================

    - name: "IngressController — patch spec.defaultCertificate → '{{ ingress_cert_secret_name }}'"
      ansible.builtin.command: >
        oc patch ingresscontroller.operator {{ ingress_controller_name }}
        -n {{ ingress_operator_namespace }}
        --type=merge
        -p '{"spec":{"defaultCertificate":{"name":"{{ ingress_cert_secret_name }}"}}}'
      register: _patch_result
      changed_when: "'no change' not in _patch_result.stdout"
      tags: [replace]

    - name: "IngressController — wynik patcha"
      ansible.builtin.debug:
        msg: "{{ _patch_result.stdout }}"
      tags: [replace]

    # =========================================================================
    # 6. Oczekiwanie na rollout routerów — tag: replace
    # =========================================================================

    - name: "Rollout — czekaj aż router zakończy aktualizację (max {{ ingress_rollout_timeout }}s)"
      ansible.builtin.command: >
        oc rollout status deployment/router-{{ ingress_controller_name }}
        -n {{ ingress_namespace }}
        --timeout={{ ingress_rollout_timeout }}s
      register: _rollout_status
      changed_when: false
      retries: 3
      delay: 10
      until: _rollout_status.rc == 0
      tags: [replace]

    - name: "Rollout — status"
      ansible.builtin.debug:
        msg: "{{ _rollout_status.stdout_lines }}"
      tags: [replace]

    # =========================================================================
    # 7. Weryfikacja certyfikatu — tag: replace, verify
    # =========================================================================

    - name: "Weryfikacja — pobierz domenę z IngressController"
      ansible.builtin.command: >
        oc get ingresscontroller {{ ingress_controller_name }}
        -n {{ ingress_operator_namespace }}
        -o jsonpath='{.status.domain}'
      register: _ingress_domain
      changed_when: false
      tags: [replace, verify]

    - name: "Weryfikacja — aktualny Secret w IngressController"
      ansible.builtin.command: >
        oc get ingresscontroller {{ ingress_controller_name }}
        -n {{ ingress_operator_namespace }}
        -o jsonpath='{.spec.defaultCertificate.name}'
      register: _verify_secret
      changed_when: false
      tags: [replace, verify]

    - name: "Weryfikacja — aktualny trustedCA w proxy/cluster"
      ansible.builtin.command: oc get proxy cluster -o jsonpath='{.spec.trustedCA.name}'
      register: _verify_proxy_ca
      changed_when: false
      tags: [replace, verify]

    - name: "Weryfikacja — sprawdź certyfikat przez OpenSSL"
      ansible.builtin.shell: >
        openssl s_client
        -connect console-openshift-console.{{ _ingress_domain.stdout }}:443
        -servername console-openshift-console.{{ _ingress_domain.stdout }}
        </dev/null 2>/dev/null | openssl x509 -noout -subject -dates -issuer
      register: _cert_info
      changed_when: false
      failed_when: false
      when: _ingress_domain.stdout | length > 0
      tags: [replace, verify]

    - name: "Weryfikacja — podsumowanie"
      ansible.builtin.debug:
        msg:
          - "=== CERTYFIKAT INGRESS — STATUS ==="
          - "Domena Ingress        : {{ _ingress_domain.stdout | default('N/A') }}"
          - "Secret (router)       : {{ _verify_secret.stdout | default('(self-signed)') }}"
          - "proxy/cluster trustedCA: {{ _verify_proxy_ca.stdout | default('(brak)') }}"
          - "--- OpenSSL ---"
          - "{{ _cert_info.stdout_lines | default(['OpenSSL check pominięty']) }}"
      tags: [replace, verify]

    # =========================================================================
    # 8. Rollback — przywrócenie poprzedniego stanu — tag: rollback
    # =========================================================================

    - name: "Rollback — sprawdź czy plik backup istnieje"
      ansible.builtin.stat:
        path: "{{ ingress_cert_backup_file }}"
      register: _backup_stat
      tags: [rollback]

    - name: "Rollback — BŁĄD: plik backup nie istnieje"
      ansible.builtin.fail:
        msg: >
          Plik backup {{ ingress_cert_backup_file }} nie istnieje.
          Uruchom najpierw: ansible-playbook ingress_cert_replace.yml --tags backup
          lub backup jest tworzony automatycznie przez --tags replace.
      when: not _backup_stat.stat.exists
      tags: [rollback]

    - name: "Rollback — załaduj zmienne z pliku backup"
      ansible.builtin.include_vars:
        file: "{{ ingress_cert_backup_file }}"
      tags: [rollback]

    - name: "Rollback — wyświetl cel przywrócenia"
      ansible.builtin.debug:
        msg:
          - "Przywracam IngressController '{{ ingress_controller_name }}'"
          - "  Secret      : {{ previous_cert_secret_name | default('(self-signed — usuń pole)') }}"
          - "  proxy trustedCA: {{ previous_proxy_ca_name | default('(brak — usuń pole)') }}"
      tags: [rollback]

    # --- IngressController rollback ---

    - name: "Rollback — IngressController: przywróć self-signed (usuń spec.defaultCertificate)"
      ansible.builtin.command: >
        oc patch ingresscontroller.operator {{ ingress_controller_name }}
        -n {{ ingress_operator_namespace }}
        --type=json
        -p '[{"op":"remove","path":"/spec/defaultCertificate"}]'
      register: _rollback_ic_remove
      changed_when: _rollback_ic_remove.rc == 0
      failed_when:
        - _rollback_ic_remove.rc != 0
        - "'not found' not in _rollback_ic_remove.stderr | lower"
        - "'does not exist' not in _rollback_ic_remove.stderr | lower"
      when: previous_cert_secret_name | default('') | length == 0
      tags: [rollback]

    - name: "Rollback — IngressController: przywróć poprzedni Secret '{{ previous_cert_secret_name | default('') }}'"
      ansible.builtin.command: >
        oc patch ingresscontroller.operator {{ ingress_controller_name }}
        -n {{ ingress_operator_namespace }}
        --type=merge
        -p '{"spec":{"defaultCertificate":{"name":"{{ previous_cert_secret_name }}"}}}'
      register: _rollback_ic_patch
      changed_when: "'no change' not in _rollback_ic_patch.stdout"
      when: previous_cert_secret_name | default('') | length > 0
      tags: [rollback]

    # --- proxy/cluster rollback ---

    - name: "Rollback — proxy/cluster: usuń spec.trustedCA"
      ansible.builtin.command: >
        oc patch proxy/cluster
        --type=json
        -p '[{"op":"remove","path":"/spec/trustedCA"}]'
      register: _rollback_proxy_remove
      changed_when: _rollback_proxy_remove.rc == 0
      failed_when:
        - _rollback_proxy_remove.rc != 0
        - "'not found' not in _rollback_proxy_remove.stderr | lower"
        - "'does not exist' not in _rollback_proxy_remove.stderr | lower"
      when: previous_proxy_ca_name | default('') | length == 0
      tags: [rollback]

    - name: "Rollback — proxy/cluster: przywróć poprzednią ConfigMap '{{ previous_proxy_ca_name | default('') }}'"
      ansible.builtin.command: >
        oc patch proxy/cluster
        --type=merge
        -p '{"spec":{"trustedCA":{"name":"{{ previous_proxy_ca_name }}"}}}'
      register: _rollback_proxy_patch
      changed_when: "'no change' not in _rollback_proxy_patch.stdout"
      when: previous_proxy_ca_name | default('') | length > 0
      tags: [rollback]

    # --- czekaj na rollout po rollbacku ---

    - name: "Rollback — czekaj na rollout routerów (max {{ ingress_rollout_timeout }}s)"
      ansible.builtin.command: >
        oc rollout status deployment/router-{{ ingress_controller_name }}
        -n {{ ingress_namespace }}
        --timeout={{ ingress_rollout_timeout }}s
      register: _rollback_rollout
      changed_when: false
      retries: 3
      delay: 10
      until: _rollback_rollout.rc == 0
      tags: [rollback]

    - name: "Rollback — weryfikacja stanu po przywróceniu"
      ansible.builtin.command: >
        oc get ingresscontroller {{ ingress_controller_name }}
        -n {{ ingress_operator_namespace }}
        -o jsonpath='{.spec.defaultCertificate.name}'
      register: _rollback_verify_ic
      changed_when: false
      tags: [rollback]

    - name: "Rollback — weryfikacja proxy/cluster po przywróceniu"
      ansible.builtin.command: oc get proxy cluster -o jsonpath='{.spec.trustedCA.name}'
      register: _rollback_verify_proxy
      changed_when: false
      tags: [rollback]

    - name: "Rollback — podsumowanie"
      ansible.builtin.debug:
        msg:
          - "=== ROLLBACK ZAKOŃCZONY ==="
          - "IngressController Secret : {{ _rollback_verify_ic.stdout | default('(self-signed)') }}"
          - "proxy/cluster trustedCA  : {{ _rollback_verify_proxy.stdout | default('(brak)') }}"
      tags: [rollback]
