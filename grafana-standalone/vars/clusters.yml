---
# =============================================================================
# Konfiguracja Grafany
# =============================================================================
grafana_port: 3000
grafana_admin_user: admin
grafana_admin_password: "OCP-Grafana-2025!"   # ZMIEN przed uruchomieniem
grafana_domain: "{{ ansible_fqdn }}"          # lub np. grafana.firma.pl

# =============================================================================
# Lista klastrow OCP
# Kazdy klaster = osobny datasource w Grafanie (widoczny w dropdown)
# kubeconfig: sciezka do pliku kubeconfig NA MASZYNIE ANSIBLE (nie na hoście Grafany)
# =============================================================================
ocp_clusters:
  - name: prod
    kubeconfig: "~/.kube/prod"

  - name: dev
    kubeconfig: "~/.kube/dev"

  # - name: staging
  #   kubeconfig: "~/.kube/staging"
