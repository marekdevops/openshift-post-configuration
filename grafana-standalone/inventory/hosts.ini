[grafana]
grafana-server ansible_host=192.168.1.100 ansible_user=marek

[grafana:vars]
ansible_python_interpreter=/usr/bin/python3

# =============================================================================
# Bastion — host z dostepem do OCP (oc, kubeconfigs, API)
# Playbook add-clusters.yml uruchamiasz NA bastionie.
# ansible_connection=local bo playbook jest odpalany z samego bastionu.
# =============================================================================
[bastion]
bastion ansible_connection=local ansible_python_interpreter=/usr/bin/python3
