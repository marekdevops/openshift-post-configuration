---
# =============================================================================
# node_roles_setup.yml
# Playbook: Tworzenie custom ról nodów w OpenShift z opcjonalną twardą izolacją
#
# Co robi (dla każdej roli z vars/node_roles.yml):
#   1. Weryfikuje że wskazane nody i namespace'y istnieją w klastrze
#   2. Nadaje nodom etykietę node-role.kubernetes.io/<name>
#   3. Opcjonalnie usuwa etykietę node-role.kubernetes.io/worker
#   4. Opcjonalnie nakłada taint (twarda izolacja: dedicated=<name>:NoSchedule)
#   5. Tworzy MachineConfigPool dziedziczący konfigurację z worker
#   6. Ustawia namespace annotations:
#      - openshift.io/node-selector          (pody idą TYLKO na te nody)
#      - scheduler.alpha.kubernetes.io/tolerations  (automatyczny toleration
#        dla każdego poda via PodTolerationRestriction admission plugin)
#   7. Weryfikuje wynik: taints, etykiety, MCP, namespace annotations
#
# Wymagania:
#   ansible-galaxy collection install kubernetes.core
#   pip install kubernetes
#
# Uruchomienie:
#   ansible-playbook node_roles_setup.yml
#   ansible-playbook node_roles_setup.yml --check             # dry-run
#   ansible-playbook node_roles_setup.yml --tags label        # tylko labelowanie
#   ansible-playbook node_roles_setup.yml --tags taint        # tylko tainty
#   ansible-playbook node_roles_setup.yml --tags mcp          # tylko MCP
#   ansible-playbook node_roles_setup.yml --tags namespace    # tylko NS annotations
#   ansible-playbook node_roles_setup.yml --tags verify       # tylko weryfikacja
#
# Klaster wykrywany z aktywnej sesji oc (~/.kube/config).
# Wymagane uprawnienia: cluster-admin
# =============================================================================

- name: "OpenShift — konfiguracja custom ról nodów"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/node_roles.yml

  tasks:

    # -------------------------------------------------------------------------
    # 0. Weryfikacja środowiska
    # -------------------------------------------------------------------------

    - name: "Weryfikacja — aktywna sesja oc"
      ansible.builtin.command: oc whoami
      register: oc_user
      changed_when: false
      failed_when: oc_user.rc != 0
      tags: [always]

    - name: "Weryfikacja — uprawnienia cluster-admin"
      ansible.builtin.command: oc auth can-i '*' '*' --all-namespaces
      register: can_admin
      changed_when: false
      failed_when: can_admin.stdout | trim != 'yes'
      tags: [always]

    - name: "INFO — zalogowany jako"
      ansible.builtin.debug:
        msg: "Zalogowany jako: {{ oc_user.stdout }}"
      tags: [always]

    - name: "INFO — role do skonfigurowania"
      ansible.builtin.debug:
        msg: >-
          • {{ item.name }}
          — nody: {{ item.nodes | length }}
          — namespace'y: {{ item.namespaces | join(', ') }}
          — MCP max_unavailable: {{ item.mcp.max_unavailable }}
          — usuń rolę worker: {{ item.remove_worker_role | default(false) }}
          — taint: {{ item.taint.key + '=' + item.taint.value + ':' + item.taint.effect
             if item.taint.enabled | default(false) else 'wyłączony' }}
      loop: "{{ node_roles }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [always]

    # -------------------------------------------------------------------------
    # 1. Weryfikacja istnienia nodów i namespace'ów
    # -------------------------------------------------------------------------

    - name: "Weryfikacja — sprawdzenie czy wskazane nody istnieją"
      ansible.builtin.command: oc get node {{ item.1 }}
      loop: "{{ node_roles | subelements('nodes') }}"
      loop_control:
        label: "[{{ item.0.name }}] {{ item.1 }}"
      register: node_check
      changed_when: false
      failed_when: node_check.rc != 0
      tags: [always, label, taint]

    - name: "Weryfikacja — sprawdzenie czy wskazane namespace'y istnieją"
      ansible.builtin.command: oc get namespace {{ item.1 }}
      loop: "{{ node_roles | subelements('namespaces') }}"
      loop_control:
        label: "[{{ item.0.name }}] namespace/{{ item.1 }}"
      register: ns_existence
      changed_when: false
      failed_when: false
      tags: [always, namespace]

    - name: "Oblicz czy wszystkie namespace'y roli są gotowe"
      # ns_ready_map[<role_name>] = true  → wszystkie NS istnieją → faza 2 (taint + annotations)
      # ns_ready_map[<role_name>] = false → brakuje NS          → faza 1 (tylko label + MCP)
      ansible.builtin.set_fact:
        ns_ready_map: >-
          {{ ns_ready_map | default({}) | combine({
               item.name: (ns_existence.results
                           | selectattr('item.0.name', 'equalto', item.name)
                           | selectattr('rc', 'ne', 0)
                           | list | length == 0)
             }) }}
      loop: "{{ node_roles }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [always, namespace, taint]

    - name: "INFO — faza konfiguracji per rola"
      ansible.builtin.debug:
        msg: >-
          Rola '{{ item.name }}':
          {% if ns_ready_map[item.name] %}
          FAZA 2 — wszystkie namespace'y istnieją → taint + annotations
          {% else %}
          FAZA 1 — brakuje namespace'ów → tylko label + MCP (bez taintu)
          Uruchom playbook ponownie gdy NS będą gotowe.
          {% endif %}
      loop: "{{ node_roles }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [always, namespace, taint]

    # -------------------------------------------------------------------------
    # 2. Etykietowanie nodów
    # -------------------------------------------------------------------------

    - name: "Label — nadanie node-role.kubernetes.io/{{ item.0.name }}"
      kubernetes.core.k8s:
        state: present
        api_version: v1
        kind: Node
        name: "{{ item.1 }}"
        definition:
          metadata:
            labels: "{{ {'node-role.kubernetes.io/' + item.0.name: ''} }}"
      loop: "{{ node_roles | subelements('nodes') }}"
      loop_control:
        label: "node-role.kubernetes.io/{{ item.0.name }} → {{ item.1 }}"
      tags: [label]

    - name: "Label — usunięcie node-role.kubernetes.io/worker (jeśli remove_worker_role: true)"
      ansible.builtin.command: >
        oc label node {{ item.1 }}
        node-role.kubernetes.io/worker-
        --overwrite
      loop: "{{ node_roles | subelements('nodes') }}"
      loop_control:
        label: "remove worker role → {{ item.1 }}"
      when: item.0.remove_worker_role | default(false)
      register: remove_worker_label
      changed_when: >-
        'labeled' in remove_worker_label.stdout
        or 'unlabeled' in remove_worker_label.stdout
      tags: [label]

    # -------------------------------------------------------------------------
    # 3. Taint nodów (twarda izolacja)
    #
    # Efekt: tylko pody z matching tolerationem mogą być zaschedulowane
    # na tych nodach. Pody bez tolerationa są blokowane przez scheduler.
    #
    # Admission plugin PodTolerationRestriction automatycznie wstrzykuje
    # toleration do podów w dedykowanych namespace'ach (sekcja 4 poniżej).
    # -------------------------------------------------------------------------

    - name: "Taint — nakładanie {{ item.0.taint.key }}={{ item.0.taint.value }}:{{ item.0.taint.effect }}"
      ansible.builtin.command: >
        oc adm taint node {{ item.1 }}
        {{ item.0.taint.key }}={{ item.0.taint.value }}:{{ item.0.taint.effect }}
        --overwrite
      loop: "{{ node_roles | subelements('nodes') }}"
      loop_control:
        label: "taint {{ item.0.taint.key }}={{ item.0.taint.value }}:{{ item.0.taint.effect }} → {{ item.1 }}"
      when:
        - item.0.taint.enabled | default(false)
        - ns_ready_map[item.0.name] | bool
      register: taint_result
      changed_when: "'tainted' in taint_result.stdout"
      tags: [taint]

    # -------------------------------------------------------------------------
    # 4. MachineConfigPool
    # -------------------------------------------------------------------------

    - name: "MachineConfigPool — tworzenie puli dla roli {{ item.name }}"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: machineconfiguration.openshift.io/v1
          kind: MachineConfigPool
          metadata:
            name: "{{ item.name }}"
            labels:
              app.kubernetes.io/managed-by: ansible
          spec:
            # Selekcja nodów: te z etykietą node-role.kubernetes.io/<name>
            nodeSelector:
              matchLabels: "{{ {'node-role.kubernetes.io/' + item.name: ''} }}"

            # Dziedziczenie MachineConfig: nody dostaną konfigurację OS/kubelet
            # jak role z inherit_roles (domyślnie: worker) PLUS własne custom MC
            machineConfigSelector:
              matchExpressions:
                - key: machineconfiguration.openshift.io/role
                  operator: In
                  values: "{{ item.mcp.inherit_roles + [item.name] }}"

            # Ile nodów może być jednocześnie w trakcie aktualizacji
            # Można podać liczbę (1, 2) lub procent ("33%")
            maxUnavailable: >-
              {{ item.mcp.max_unavailable
                 if '%' in (item.mcp.max_unavailable | string)
                 else (item.mcp.max_unavailable | int) }}
      loop: "{{ node_roles }}"
      loop_control:
        label: "MachineConfigPool/{{ item.name }}"
      tags: [mcp]

    # -------------------------------------------------------------------------
    # 5. Namespace annotations
    #
    # openshift.io/node-selector:
    #   Wymusza node-selector na wszystkich podach — pody idą TYLKO na te nody.
    #
    # scheduler.alpha.kubernetes.io/tolerations:
    #   OCP admission plugin PodTolerationRestriction czyta tę annotation
    #   i wstrzykuje toleration do każdego poda w tym namespace automatycznie.
    #   Dzięki temu pody z tych NS tolerują taint na nodach bez zmian w deployment.
    # -------------------------------------------------------------------------

    - name: "Namespace — annotations z node-selector + toleration (twarda izolacja)"
      # Uruchamiane tylko gdy wszystkie NS roli istnieją (faza 2)
      kubernetes.core.k8s:
        state: present
        api_version: v1
        kind: Namespace
        name: "{{ item.1 }}"
        definition:
          metadata:
            labels:
              app.kubernetes.io/managed-by: ansible
            annotations:
              openshift.io/node-selector: "node-role.kubernetes.io/{{ item.0.name }}="
              scheduler.alpha.kubernetes.io/tolerations: >-
                {{ [{'key': item.0.taint.key,
                     'operator': 'Equal',
                     'value': item.0.taint.value,
                     'effect': item.0.taint.effect}] | to_json }}
      loop: "{{ node_roles | subelements('namespaces') }}"
      loop_control:
        label: "namespace/{{ item.1 }} → {{ item.0.name }}"
      when:
        - item.0.taint.enabled | default(false)
        - ns_ready_map[item.0.name] | bool
      tags: [namespace]

    - name: "Namespace — annotations z node-selector (bez taintu)"
      # Uruchamiane tylko gdy wszystkie NS roli istnieją (faza 2)
      kubernetes.core.k8s:
        state: present
        api_version: v1
        kind: Namespace
        name: "{{ item.1 }}"
        definition:
          metadata:
            labels:
              app.kubernetes.io/managed-by: ansible
            annotations:
              openshift.io/node-selector: "node-role.kubernetes.io/{{ item.0.name }}="
      loop: "{{ node_roles | subelements('namespaces') }}"
      loop_control:
        label: "namespace/{{ item.1 }} → {{ item.0.name }}"
      when:
        - not (item.0.taint.enabled | default(false))
        - ns_ready_map[item.0.name] | bool
      tags: [namespace]

    # -------------------------------------------------------------------------
    # 6. Weryfikacja końcowa
    # -------------------------------------------------------------------------

    - name: "Weryfikacja — taints na nodach"
      ansible.builtin.command: >
        oc get nodes -l node-role.kubernetes.io/{{ item.name }}
        -o custom-columns=NODE:.metadata.name,TAINTS:.spec.taints
      loop: "{{ node_roles }}"
      loop_control:
        label: "rola: {{ item.name }}"
      register: node_taints_check
      changed_when: false
      tags: [always, verify]

    - name: "WYNIK — taints na nodach"
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ node_taints_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      tags: [always, verify]

    - name: "Weryfikacja — stan MachineConfigPools"
      ansible.builtin.command: >
        oc get mcp {{ node_roles | map(attribute='name') | join(' ') }}
      register: mcp_status
      changed_when: false
      ignore_errors: true
      tags: [always, verify]

    - name: "WYNIK — MachineConfigPools"
      ansible.builtin.debug:
        msg: "{{ mcp_status.stdout_lines }}"
      tags: [always, verify]

    - name: "Weryfikacja — namespace annotations (raw JSON)"
      ansible.builtin.command: >-
        oc get namespace
        {{ node_roles | map(attribute='namespaces') | flatten | unique | join(' ') }}
        -o json
      register: ns_annotations_raw
      changed_when: false
      ignore_errors: true
      tags: [always, verify]

    - name: "WYNIK — namespace node-selector i toleration"
      ansible.builtin.debug:
        msg:
          - "NS: {{ item.metadata.name }}"
          - "node-selector : {{ item.metadata.annotations['openshift.io/node-selector'] | default('<brak>') }}"
          - "tolerations   : {{ item.metadata.annotations['scheduler.alpha.kubernetes.io/tolerations'] | default('<brak>') }}"
      loop: "{{ (ns_annotations_raw.stdout | from_json)['items'] }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      when: ns_annotations_raw is not failed
      tags: [always, verify]
